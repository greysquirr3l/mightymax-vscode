# Gitleaks configuration for mightymax-vscode.
#
# The default `generic-api-key` rule is overly aggressive: it flags the
# `MightyMax_Fixture_Key_77cc` sentinel in the T22 redaction-guard
# test (src/adapters/transport.test.ts) because the word "key" appears
# in a 30-character string. The sentinel value is deliberately
# non-secret-shaped (no `sk-` / no provider-prefix, no entropy
# matching a real key); it exists so the redaction test fails if the
# fixture leaks into a log line.
#
# We allowlist the fixture file via rule `generic-api-key` with a
# narrow regex so the test fixture does not break CI. Real API keys
# are still scanned everywhere.

[allowlist]
  paths = [
    '''src/adapters/transport\.test\.ts$''',
    '''src/test/.*\.test\.ts$''',
  ]
  # The default `generic-api-key` rule fires on any high-entropy
  # alphanumeric near the word "key" or "token". Allowlist test
  # fixtures that contain the deliberate sentinel strings used by
  # the T22 redaction-guard tests.
  regexes = [
    '''MightyMax_Fixture_Key_\w+''',
    '''SENTINEL_\w+''',
    '''sentinel_call_\w+''',
  ]
  stopped = false
