name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities,
# incompatible licenses, or from blocked package origins.

on:
  pull_request:
    branches: [main]

# pull-requests: write is needed for `dependency-review-action` to
# comment back on the PR with the vulnerabilities summary. Scorecard
# flags any top-level write scope, so we keep top read-only and grant
# the write only on the job that requires it.
permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce vulnerabilities (moderate or higher)
          fail-on-severity: moderate
          # Allow common permissive licenses used in npm ecosystem
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0
          comment-summary-in-pr: on-failure
