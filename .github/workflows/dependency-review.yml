name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities,
# incompatible licenses, or from blocked package origins.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Block PRs that introduce vulnerabilities (moderate or higher)
          fail-on-severity: moderate
          # Allow common permissive licenses used in npm ecosystem
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD, CC0-1.0
          comment-summary-in-pr: on-failure
