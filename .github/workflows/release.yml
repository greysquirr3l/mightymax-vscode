name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        type: string

# Concurrency: one release at a time per tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# Scorecard flags any top-level write scope, so the GITHUB_TOKEN
# stays read-only at the workflow level. Only the `release` job
# needs `contents: write` (it creates the GitHub Release); the
# `publish` job uses the per-project VSCE_PAT secret for
# marketplace auth and never touches GITHUB_TOKEN write paths.
#
# Open VSX publishing is currently disabled — see the commented
# "Publish to Open VSX" step in the publish job. Re-enable when
# the `greysquirr3l` namespace has been granted on Open VSX
# (https://github.com/EclipseFdn/open-vsx.org/issues) and the
# OVSX_PAT secret has been provisioned.
permissions:
  contents: read

jobs:
  resolve-tag:
    name: Resolve release tag and SHA
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Determine tag and SHA
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force origin

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
            SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || true)
            if [[ -z "$SHA" ]]; then
              echo "Tag $TAG not found" >&2
              exit 1
            fi
          else
            TAG="${GITHUB_REF#refs/tags/}"
            SHA="${GITHUB_SHA}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved: tag=$TAG sha=$SHA"

  verify-ci:
    name: Verify CI is green
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Wait for CI workflow result on tagged commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_SHA: ${{ needs.resolve-tag.outputs.sha }}
        run: |
          set -euo pipefail

          sha="${RELEASE_SHA}"
          repo="${GITHUB_REPOSITORY}"
          api="https://api.github.com/repos/${repo}/actions/runs?head_sha=${sha}&event=push&per_page=50"

          echo "Checking CI status for ${repo}@${sha}"

          for attempt in {1..30}; do
            json=$(curl -fsSL \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api}")

            ci_status=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .status' | head -n1)
            ci_conclusion=$(echo "${json}" | jq -r '.workflow_runs[] | select(.name == "CI") | .conclusion' | head -n1)

            if [[ -z "${ci_status}" ]]; then
              echo "Attempt ${attempt}/30: CI workflow run not found yet; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_status}" != "completed" ]]; then
              echo "Attempt ${attempt}/30: CI is ${ci_status}; waiting..."
              sleep 20
              continue
            fi

            if [[ "${ci_conclusion}" == "success" ]]; then
              echo "CI completed successfully for ${sha}"
              exit 0
            fi

            echo "CI did not pass for ${sha}: conclusion=${ci_conclusion}"
            exit 1
          done

          echo "Timed out waiting for CI completion on ${sha}"
          exit 1

  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: [resolve-tag, verify-ci]
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mighty-max-vsix
          path: mighty-max.vsix
          retention-days: 7

  publish:
    name: Publish to Marketplaces
    needs: [resolve-tag, verify-ci, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.resolve-tag.outputs.sha }}

      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mighty-max-vsix

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4
        with:
          node-version: 20

      # Install vsce from package.json's `devDependencies` via
      # `npm ci` so the tarball integrity hash from
      # `package-lock.json` is enforced (OpenSSF Scorecard
      # "Pinned-Dependencies" check). The prior shape used
      # `npm install -g @vscode/vsce@3.9.2` — that pins the
      # version spec but lets npm resolve fresh metadata from
      # the registry on every run, which the Scorecard flagged
      # with score 9.
      #
      # After `npm ci` the binary lives at
      # `node_modules/.bin/vsce`. We expose it on PATH for the
      # publish steps below via an env-relative alias rather
      # than installing globally.
      #
      # `ovsx` is left out while the Open VSX publish step is
      # commented out below — re-add (and pin via the same
      # lockfile-driven path) when the namespace is granted.
      - name: Install vsce via lockfile
        run: |
          set -euo pipefail
          npm ci --ignore-scripts --no-audit --no-fund
          ls -la node_modules/.bin/vsce

      - name: Publish to VS Code Marketplace
        if: ${{ !contains(needs.resolve-tag.outputs.tag, '-') }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ -z "${VSCE_PAT}" ]]; then
            echo "Warning: VSCE_PAT secret not set, skipping VS Code Marketplace publish"
            exit 0
          fi
          node_modules/.bin/vsce publish --packagePath mighty-max.vsix --pat "${VSCE_PAT}"

      - name: Publish pre-release to VS Code Marketplace
        if: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [[ -z "${VSCE_PAT}" ]]; then
            echo "Warning: VSCE_PAT secret not set, skipping VS Code Marketplace publish"
            exit 0
          fi
          node_modules/.bin/vsce publish --pre-release --packagePath mighty-max.vsix --pat "${VSCE_PAT}"

      # Open VSX publishing is temporarily disabled while the
      # `greysquirr3l` namespace claim is pending approval at
      # https://github.com/EclipseFdn/open-vsx.org/issues and the
      # OVSX_PAT secret has not been provisioned. Re-enable when
      # both gates are clear: drop the leading `# ` from each
      # line below, add `ovsx@latest` back to the install step
      # above, and restore the OVSX_PAT mention in the
      # workflow-level comment at the top of this file.
      # - name: Publish to Open VSX
      #   env:
      #     OVSX_PAT: ${{ secrets.OVSX_PAT }}
      #   run: |
      #     if [[ -z "${OVSX_PAT}" ]]; then
      #       echo "Warning: OVSX_PAT secret not set, skipping Open VSX publish"
      #       exit 0
      #     fi
      #     ovsx publish mighty-max.vsix --pat "${OVSX_PAT}"

  release:
    name: Create GitHub Release
    # Gated on build (a valid VSIX must exist) but deliberately NOT on
    # publish: a marketplace-auth failure (e.g. an expired VSCE_PAT
    # returning 401) must not block the GitHub Release. Publish and
    # release run in parallel off the same build artifact.
    needs: [resolve-tag, verify-ci, build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mighty-max-vsix

      - name: Generate checksum
        shell: bash
        run: sha256sum mighty-max.vsix > SHA256SUMS.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: ${{ needs.resolve-tag.outputs.tag }}
          target_commitish: ${{ needs.resolve-tag.outputs.sha }}
          name: 'Mighty Max ${{ needs.resolve-tag.outputs.tag }}'
          draft: false
          prerelease: ${{ contains(needs.resolve-tag.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            mighty-max.vsix
            SHA256SUMS.txt
