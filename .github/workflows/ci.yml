name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Compile (esbuild)
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test (Linux, headless)
        if: runner.os == 'Linux'
        run: xvfb-run -a npm test

      - name: Test (macOS / Windows)
        if: runner.os != 'Linux'
        run: npm test

      - name: Audit dependencies (production)
        # Production deps are audited in `security.yml` on every
        # push and on a weekly cron. The dev audit pulls in
        # transitive CVEs from toolchain packages (jsdiff, undici,
        # esbuild, linkify-it) that already pin lower than the
        # upstream fix and have no non-breaking release line;
        # bumping them is out of scope for routine PRs. The
        # production audit in security.yml remains the source of
        # truth for the published extension.
        run: npm audit --omit=dev --audit-level=high

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mighty-max-${{ matrix.os }}-${{ github.sha }}
          path: mighty-max.vsix
          if-no-files-found: warn
          retention-days: 7
